<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Weather Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<div class="container">

    <div class="top-bar">
        <h1>Weather Dashboard</h1>

        <div class="search">
            <input type="text" class="inputfield" placeholder="Search City">
            <button onclick="fetchData()">🔍</button>
        </div>
    </div>

    <div class="hero-card">
        <div>
            <p id="datetime">Monday, 08:45 AM</p>
            <h2 id="city-name">Search a city</h2>
            <h1 class="temp" id="temp">29°</h1>
            <h3 id="description">☁️ Cloudy</h3>
        </div>

        <img id="weather-icon" src="https://openweathermap.org/img/wn/03d@4x.png" alt="Weather Icon">
    </div>

    <div class="stats">

        <div class="card">
            <h3>💧 Humidity</h3>
            <h1 id="humidity">72%</h1>
        </div>

        <div class="card">
            <h3>🌬 Wind</h3>
            <h1 id="wind">15 km/h</h1>
        </div>

        <div class="card">
            <h3>☀ UV Index</h3>
            <h1 id="uv">5</h1>
        </div>

        <div class="card">
            <h3>🌡 Feels Like</h3>
            <h1 id="feels-like">31°</h1>
        </div>

    </div>

    <div class="forecast">

        <h2>Today's Forecast</h2>

        <div class="hourly">

            <div class="hour-card">
                <p>9 AM</p>
                <h2>☀️</h2>
                <h3>30°</h3>
            </div>

            <div class="hour-card">
                <p>12 PM</p>
                <h2>⛅</h2>
                <h3>32°</h3>
            </div>

            <div class="hour-card">
                <p>3 PM</p>
                <h2>☁️</h2>
                <h3>31°</h3>
            </div>

            <div class="hour-card">
                <p>6 PM</p>
                <h2>🌧</h2>
                <h3>27°</h3>
            </div>

        </div>

    </div>

    <div class="bottom-grid">

        <div class="large-card">
            <h2>🌅 Sunrise & Sunset</h2>

            <div class="sun">
                <div>
                    <h3>Sunrise</h3>
                    <p id="sunrise">5:52 AM</p>
                </div>

                <div>
                    <h3>Sunset</h3>
                    <p id="sunset">6:35 PM</p>
                </div>
            </div>
        </div>

        <div class="large-card">
            <h2>🌍 Air Quality</h2>
            <h1>78</h1>
            <p>Moderate</p>
        </div>

    </div>

</div>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script>
    function formatTime(date) {
        return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function getDateTimeString() {
        return new Date().toLocaleString([], {
            weekday: 'long',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        });
    }

    async function fetchData() {
        const cityName = document.getElementsByClassName('inputfield')[0].value.trim();
        if (!cityName) {
            alert('Please enter a city name.');
            return;
        }

        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityName)}&appid=077b7c5a1107a18981348f2888b81040&units=metric`);
        const data = await response.json();

        if (!response.ok) {
            alert(data.message || 'Unable to load weather data.');
            return;
        }

        document.getElementById('city-name').textContent = data.name;
        document.getElementById('datetime').textContent = getDateTimeString();
        document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°`;
        document.getElementById('description').textContent = `${data.weather[0].main} · ${data.weather[0].description}`;
        document.getElementById('humidity').textContent = `${data.main.humidity}%`;
        document.getElementById('wind').textContent = `${Math.round(data.wind.speed * 3.6)} km/h`;
        document.getElementById('feels-like').textContent = `${Math.round(data.main.feels_like)}°`;
        document.getElementById('sunrise').textContent = formatTime(new Date(data.sys.sunrise * 1000));
        document.getElementById('sunset').textContent = formatTime(new Date(data.sys.sunset * 1000));

        const icon = data.weather[0].icon;
        const iconUrl = `https://openweathermap.org/img/wn/${icon}@4x.png`;
        const weatherIcon = document.getElementById('weather-icon');
        weatherIcon.src = iconUrl;
        weatherIcon.alt = data.weather[0].description;
    }
</script>
</body>
</html>
